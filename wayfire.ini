[input]
xkb_layout = br
xkb_variant = abnt2

[core]
plugins = command switcher move resize decoration expo scale wm-actions grid

[command]
binding_terminal = <super> KEY_ENTER
command_terminal = foot

binding_launcher = <super> KEY_D
command_launcher = wofi --show drun

binding_browser = <super> KEY_B
command_browser = firefox

binding_filemanager = <super> KEY_E
command_filemanager = nautilus

[scale]
toggle = <super> <shift> KEY_TAB

[wm-actions]
toggle_maximize = <super> KEY_M

[grid]
slot_l = <super> KEY_LEFT
slot_r = <super> KEY_RIGHT
slot_t = <super> KEY_UP
slot_b = <super> KEY_DOWN